name: CI

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --all-extras
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Ruff check
        run: uv run ruff check .
      - name: Pytest
        run: uv run pytest
