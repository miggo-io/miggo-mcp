[project]
name = "miggo-public-server"
version = "0.1.0"
description = "FastMCP server targeting Miggo's public API"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "mcp[cli]>=0.1.0",
    "httpx>=0.25.0",
]

[project.scripts]
miggo-public-mcp = "miggo_public_server.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/miggo_public_server"]

[tool.hatch.build.targets.sdist]
include = ["src", "scripts", "README.md", "pyproject.toml"]

[tool.uv]
dev-dependencies = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.1",
    "pytest-httpx>=0.23.0",
    "respx>=0.21.1",
]
